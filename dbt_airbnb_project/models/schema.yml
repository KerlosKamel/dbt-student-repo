models:
    - name: dim_listings_cleansed
      columns:
          - name: listing_id
            data_tests:
                - unique
                - not_null

          - name: host_id
            data_tests:
                - not_null
                - relationships:
                    to: ref('dim_hosts_cleansed')
                    field: host_id

          - name: room_type
            data_tests:
                - accepted_values:
                    values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']


    - name: dim_hosts_cleansed
      columns:
          - name: host_id
            data_tests:
                - unique
                - not_null

          - name: host_name
            data_tests:
                - not_null

          - name: is_superhost
            data_tests:
                - accepted_values:
                    values: ['t', 'f']


    - name: fct_reviews
      columns:
          - name: listing_id
            data_tests:
             - relationships:
                to: ref('dim_listings_cleansed')
                field: listing_id

          - name: reviewer_name
            data_tests:
                - not_null

          - name: review_sentiment
            data_tests:
                - accepted_values:
                    values: ['positive', 'negative', 'neutral']



# dbt has 4 built-in tests options: 1-unique.    2-not_null.   3-relationships.    4-accepted_values

# snowflake has 4 built-in constraints options can be set: 1-unique.    2-primary/foreign keys.    3-not_null.